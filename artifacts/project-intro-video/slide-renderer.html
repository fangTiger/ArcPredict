<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArcPredict video slides</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #050816;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #stage {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      #stage {
        position: relative;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        background: radial-gradient(circle at 18% 18%, rgba(77, 168, 255, 0.2), transparent 34%),
          radial-gradient(circle at 82% 12%, rgba(103, 255, 181, 0.14), transparent 30%),
          #050816;
      }

      .backdrop {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(1.08) contrast(1.04);
      }

      .scrim {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(3, 6, 20, 0.18), rgba(3, 6, 20, 0.58));
      }

      .copy {
        position: absolute;
        left: 42px;
        right: 42px;
        bottom: 54px;
        min-height: 142px;
        padding: 24px 30px 22px 34px;
        border-left: 5px solid rgba(77, 168, 255, 0.96);
        border-radius: 18px;
        background: rgba(5, 8, 22, 0.74);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38), inset 0 0 0 1px rgba(184, 215, 255, 0.15);
        backdrop-filter: blur(18px) saturate(130%);
      }

      .eyebrow {
        margin-bottom: 10px;
        color: #67ffb5;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        color: #ffffff;
        font-size: 44px;
        line-height: 1.05;
        letter-spacing: 0;
        font-weight: 700;
      }

      .subtitle {
        max-width: 1040px;
        margin: 14px 0 0;
        color: #b8d7ff;
        font-size: 24px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .badge {
        position: absolute;
        top: 26px;
        right: 34px;
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid rgba(184, 215, 255, 0.2);
        background: rgba(5, 8, 22, 0.68);
        color: #dfeeff;
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .closing .copy {
        top: 152px;
        bottom: auto;
        min-height: 236px;
        padding-top: 34px;
        text-align: left;
      }

      .closing .title {
        font-size: 58px;
      }

      .closing .subtitle {
        font-size: 29px;
      }
    </style>
  </head>
  <body>
    <main id="stage" aria-label="ArcPredict project introduction slide">
      <img class="backdrop" id="backdrop" alt="" />
      <div class="scrim"></div>
      <div class="badge" id="badge"></div>
      <section class="copy">
        <div class="eyebrow" id="eyebrow"></div>
        <h1 class="title" id="title"></h1>
        <p class="subtitle" id="subtitle"></p>
      </section>
    </main>
    <script>
      const slides = [
        {
          image: 'screens/worldcup-home.png',
          badge: '00:00',
          eyebrow: 'Project intro',
          title: 'ArcPredict',
          subtitle: 'USDC prediction markets on Arc Testnet.',
        },
        {
          image: 'screens/crypto-home.png',
          badge: 'Crypto',
          eyebrow: 'Board one',
          title: 'Pyth-backed price markets',
          subtitle: 'BTC, ETH, and SOL markets with visible deadlines, pools, and user positions.',
        },
        {
          image: 'screens/crypto-home.png',
          badge: 'UX',
          eyebrow: 'Market cards',
          title: 'Readable before tradable',
          subtitle: 'The question, split, liquidity, and close time are visible before a user places a bet.',
        },
        {
          image: 'screens/worldcup-home.png',
          badge: 'World Cup',
          eyebrow: 'New category',
          title: 'From prices to events',
          subtitle: 'The World Cup board adds home win, draw, away win, spread, and winner markets.',
        },
        {
          image: 'screens/worldcup-scrolled.png',
          badge: 'Event markets',
          eyebrow: 'Multi-outcome',
          title: 'Built for the sport',
          subtitle: 'EventMarket supports more than two outcomes while keeping the same USDC user flow.',
        },
        {
          image: 'screens/worldcup-home.png',
          badge: 'Settlement',
          eyebrow: 'Oracle path',
          title: 'Explicit trust assumptions',
          subtitle: 'AdminEventOracle uses result proposals, a 72-hour dispute window, and finalization.',
        },
        {
          image: 'screens/worldcup-home.png',
          badge: 'ArcPredict',
          eyebrow: 'Closing',
          title: 'Understand. Trade. Settle.',
          subtitle: 'One interface for markets people can understand and settle on-chain.',
          closing: true,
        },
      ];

      const params = new URLSearchParams(window.location.search);
      const slideIndex = Number(params.get('slide') ?? '0');
      const slide = slides[Math.max(0, Math.min(slideIndex, slides.length - 1))];

      document.body.classList.toggle('closing', Boolean(slide.closing));
      document.getElementById('backdrop').src = slide.image;
      document.getElementById('badge').textContent = slide.badge;
      document.getElementById('eyebrow').textContent = slide.eyebrow;
      document.getElementById('title').textContent = slide.title;
      document.getElementById('subtitle').textContent = slide.subtitle;
    </script>
  </body>
</html>
