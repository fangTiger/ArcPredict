[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
  { access = "read", path = "./out" },
  { access = "write", path = "../web/lib" }
]
verbosity = 2

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 32
fail_on_revert = false
