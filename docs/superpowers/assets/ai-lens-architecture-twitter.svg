<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowCenter" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 442) rotate(90) scale(405 640)">
      <stop offset="0" stop-color="#20E0D2" stop-opacity="0.32"/>
      <stop offset="0.42" stop-color="#1C6EE8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#05070D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="203" y1="143" x2="1399" y2="747" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#071019" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2BF4E8"/>
      <stop offset="1" stop-color="#68A7FF"/>
    </linearGradient>
    <linearGradient id="hotLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF6B6B"/>
      <stop offset="1" stop-color="#FFC857"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#92FFB4"/>
      <stop offset="1" stop-color="#2BF4E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.95 0 0 0 0 0.9 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#8FB7C7" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: "Avenir Next", "Helvetica Neue", Helvetica, sans-serif; }
      .smallCaps { letter-spacing: 0.12em; text-transform: uppercase; }
      .title { font-weight: 760; letter-spacing: 0; }
      .label { fill: #D9F7FF; font-weight: 650; }
      .muted { fill: #85A0AE; }
      .fine { fill: #A7C2CE; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#05070D"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#glowCenter)"/>
  <circle cx="1315" cy="155" r="176" fill="#FF6B6B" opacity="0.07"/>
  <circle cx="252" cy="778" r="220" fill="#2BF4E8" opacity="0.08"/>

  <g filter="url(#softShadow)">
    <rect x="88" y="72" width="1424" height="756" rx="32" fill="url(#panel)" stroke="#A8F7FF" stroke-opacity="0.18"/>
    <rect x="112" y="96" width="1376" height="708" rx="24" fill="#071019" fill-opacity="0.56" stroke="#FFFFFF" stroke-opacity="0.08"/>
  </g>

  <g class="sans">
    <text x="142" y="156" fill="#DDFBFF" font-size="58" class="title">ArcPredict AI Lens</text>
    <text x="145" y="198" fill="#8EADB8" font-size="22">On-demand probability insight. Shared cache. Zero settlement impact.</text>
    <g transform="translate(1196 134)">
      <rect width="206" height="48" rx="24" fill="#122334" stroke="#2BF4E8" stroke-opacity="0.42"/>
      <circle cx="30" cy="24" r="8" fill="#92FFB4" filter="url(#cyanGlow)"/>
      <text x="50" y="31" fill="#DDFBFF" font-size="17" font-weight="650">UI sidecar only</text>
    </g>
  </g>

  <!-- left product card -->
  <g transform="translate(144 292)" class="sans">
    <rect width="300" height="258" rx="22" fill="#0D1623" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="18" y="18" width="264" height="56" rx="16" fill="#162335" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="35" y="53" fill="#DDFBFF" font-size="21" font-weight="720">Market card</text>
    <text x="35" y="102" fill="#8EADB8" font-size="16">BTC above threshold?</text>
    <g transform="translate(35 126)">
      <rect width="205" height="14" rx="7" fill="#1D2A3A"/>
      <rect width="124" height="14" rx="7" fill="url(#cyanLine)"/>
      <circle cx="124" cy="7" r="13" fill="#DDFBFF"/>
      <text x="0" y="48" fill="#DDFBFF" font-size="34" font-weight="760">62%</text>
      <text x="82" y="46" fill="#86A4B0" font-size="15">market implied</text>
    </g>
    <g transform="translate(26 204)">
      <rect width="248" height="40" rx="20" fill="#10202E" stroke="#2BF4E8" stroke-opacity="0.5"/>
      <path d="M31 14L35 22L44 25L36 29L32 37L28 29L20 25L29 22L31 14Z" fill="#2BF4E8"/>
      <text x="58" y="26" fill="#DDFBFF" font-size="18" font-weight="720">Ask AI</text>
      <text x="134" y="26" fill="#85A0AE" font-size="14">tap to generate</text>
    </g>
  </g>

  <!-- input bundle -->
  <g transform="translate(512 268)" class="sans">
    <rect width="260" height="310" rx="24" fill="#0B1420" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="28" y="49" class="smallCaps" fill="#2BF4E8" font-size="14" font-weight="760">Context bundle</text>
    <g transform="translate(28 82)">
      <rect width="204" height="44" rx="14" fill="#132234"/>
      <text x="18" y="29" fill="#DDFBFF" font-size="17" font-weight="650">Market state</text>
    </g>
    <g transform="translate(28 142)">
      <rect width="204" height="44" rx="14" fill="#132234"/>
      <text x="18" y="29" fill="#DDFBFF" font-size="17" font-weight="650">Pyth prices</text>
    </g>
    <g transform="translate(28 202)">
      <rect width="204" height="44" rx="14" fill="#132234"/>
      <text x="18" y="29" fill="#DDFBFF" font-size="17" font-weight="650">Event facts</text>
    </g>
    <text x="28" y="276" fill="#85A0AE" font-size="15">Only visible data goes in.</text>
  </g>

  <!-- central lens -->
  <g transform="translate(802 420)" class="sans">
    <circle r="151" fill="#07111B" stroke="#2BF4E8" stroke-opacity="0.38" stroke-width="2"/>
    <circle r="112" fill="#0F1D2A" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <circle r="78" fill="#08131E" stroke="#2BF4E8" stroke-opacity="0.4"/>
    <path d="M-92 23C-50 -47 48 -47 92 23" stroke="url(#cyanLine)" stroke-width="14" stroke-linecap="round"/>
    <path d="M-42 23C-22 -12 23 -12 42 23" stroke="url(#hotLine)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="-92" cy="23" r="8" fill="#2BF4E8"/>
    <circle cx="92" cy="23" r="8" fill="#68A7FF"/>
    <line x1="-72" y1="66" x2="72" y2="66" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>
    <rect x="-54" y="53" width="92" height="26" rx="13" fill="#15283B" stroke="#2BF4E8" stroke-opacity="0.35"/>
    <text x="0" y="-24" text-anchor="middle" fill="#DDFBFF" font-size="31" font-weight="800">AI Lens</text>
    <text x="0" y="6" text-anchor="middle" fill="#8EADB8" font-size="15">DeepSeek + schema guardrails</text>
    <text x="0" y="71" text-anchor="middle" fill="#DDFBFF" font-size="14" font-weight="700">fair range</text>
  </g>

  <!-- right output -->
  <g transform="translate(1062 268)" class="sans">
    <rect width="340" height="310" rx="24" fill="#0B1420" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="30" y="49" class="smallCaps" fill="#92FFB4" font-size="14" font-weight="760">Lens output</text>
    <text x="30" y="92" fill="#DDFBFF" font-size="28" font-weight="760">Fair probability</text>
    <g transform="translate(30 120)">
      <rect width="270" height="18" rx="9" fill="#1D2A3A"/>
      <rect x="78" width="78" height="18" rx="9" fill="url(#greenLine)"/>
      <line x1="188" y1="-10" x2="188" y2="28" stroke="#FFBE5C" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="56" fill="#85A0AE" font-size="15">AI 29–38%</text>
      <text x="180" y="56" fill="#FFC857" font-size="15">market 62%</text>
    </g>
    <g transform="translate(30 198)">
      <rect width="278" height="38" rx="14" fill="#132234"/>
      <text x="17" y="25" fill="#DDFBFF" font-size="16">3–5 factors</text>
      <rect x="0" y="52" width="278" height="38" rx="14" fill="#132234"/>
      <text x="17" y="77" fill="#DDFBFF" font-size="16">Traceable sources</text>
    </g>
  </g>

  <!-- arrows -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M458 421H493" stroke="url(#cyanLine)" stroke-width="5"/>
    <path d="M488 407L507 421L488 435" stroke="#2BF4E8" stroke-width="5"/>
    <path d="M785 421H640" stroke="#2BF4E8" stroke-opacity="0.12" stroke-width="22"/>
    <path d="M780 421H786" stroke="#2BF4E8" stroke-width="5"/>
    <path d="M774 407L793 421L774 435" stroke="#2BF4E8" stroke-width="5"/>
    <path d="M954 421H1042" stroke="url(#greenLine)" stroke-width="5"/>
    <path d="M1027 407L1046 421L1027 435" stroke="#92FFB4" stroke-width="5"/>
  </g>

  <!-- cache and guardrails chips -->
  <g class="sans">
    <g transform="translate(570 642)">
      <rect width="205" height="52" rx="18" fill="#0C1825" stroke="#2BF4E8" stroke-opacity="0.26"/>
      <text x="24" y="32" fill="#DDFBFF" font-size="17" font-weight="680">Shared cache</text>
      <text x="137" y="32" fill="#85A0AE" font-size="14">6h / 24h</text>
    </g>
    <g transform="translate(802 642)">
      <rect width="205" height="52" rx="18" fill="#0C1825" stroke="#FFC857" stroke-opacity="0.28"/>
      <text x="24" y="32" fill="#DDFBFF" font-size="17" font-weight="680">Budget gate</text>
      <text x="137" y="32" fill="#85A0AE" font-size="14">$ cap</text>
    </g>
  </g>

  <!-- settlement isolation -->
  <g transform="translate(152 718)" class="sans">
    <rect width="1296" height="60" rx="22" fill="#080D14" stroke="#FF6B6B" stroke-opacity="0.34"/>
    <path d="M26 30H1204" stroke="#FF6B6B" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="10 10"/>
    <rect x="38" y="13" width="178" height="34" rx="17" fill="#26121A" stroke="#FF6B6B" stroke-opacity="0.45"/>
    <text x="62" y="36" fill="#FFD5D5" font-size="16" font-weight="720">Contracts</text>
    <rect x="242" y="13" width="178" height="34" rx="17" fill="#26121A" stroke="#FF6B6B" stroke-opacity="0.45"/>
    <text x="278" y="36" fill="#FFD5D5" font-size="16" font-weight="720">Oracle</text>
    <rect x="446" y="13" width="190" height="34" rx="17" fill="#26121A" stroke="#FF6B6B" stroke-opacity="0.45"/>
    <text x="482" y="36" fill="#FFD5D5" font-size="16" font-weight="720">Settlement</text>
    <text x="750" y="36" fill="#FFB7B7" font-size="18" font-weight="760">untouched by AI Lens</text>
    <text x="1017" y="36" fill="#85A0AE" font-size="15">UI-only probability reference</text>
  </g>

  <g class="sans">
    <text x="143" y="831" fill="#557482" font-size="15">AI estimate based on listed sources. Not financial advice. Not a settlement oracle.</text>
    <text x="1235" y="831" fill="#557482" font-size="15" text-anchor="end">Designed for ArcPredict · 2026</text>
  </g>
</svg>
